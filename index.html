<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AME</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      color: #1c1c1c;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    canvas#main {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 60px;
      position: relative;
      z-index: 3;
    }
    .nav-logo { font-size: 15px; font-weight: 500; letter-spacing: 0.22em; }
    .nav-right { display: flex; align-items: center; gap: 40px; }
    .nav-links { display: flex; gap: 36px; }
    .nav-links a { font-size: 11px; color: #aaa; text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s; }
    .nav-links a:hover { color: #1c1c1c; }
    .lang { font-size: 11px; color: #ccc; letter-spacing: 0.08em; cursor: pointer; }
    .lang span { color: #1c1c1c; }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 60px;
      position: relative;
      z-index: 3;
    }

    .tagline-wrap {
      font-size: 30px;
      font-weight: 500;
      line-height: 1.7;
      letter-spacing: 0.22em;
      color: #1c1c1c;
      text-transform: uppercase;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(-240px);
    }

    .puddle-wrap {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .puddle-canvas-wrap {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }
    .identity-name {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.14em;
      position: relative;
      z-index: 2;
    }
    .identity-role {
      font-size: 9px;
      color: #bbb;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 5px;
      position: relative;
      z-index: 2;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      border-top: 0.5px solid #f0f0f0;
      position: relative;
      z-index: 3;
    }
    .footer-copy { font-size: 10px; color: #ccc; letter-spacing: 0.08em; }
    .footer-contact {
      font-size: 11px; color: #888; text-decoration: none;
      letter-spacing: 0.1em; display: flex; align-items: center; gap: 6px;
    }
    .footer-contact:hover { color: #1c1c1c; }
  </style>
</head>
<body>

<canvas id="main"></canvas>

<nav>
  <div class="nav-logo">AME</div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="works.html">Works</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="lang"><span>JP</span> / EN</div>
  </div>
</nav>

<div class="hero">
  <div class="tagline-wrap" id="tagline"></div>

  <div class="puddle-wrap" id="puddle-wrap">
    <div class="puddle-canvas-wrap">
      <canvas id="puddle" width="280" height="30"></canvas>
    </div>
    <div class="identity-name">杜　夢　/ Du Meng</div>
    <div class="identity-role">Producer · Creative Coodinator · Tokyo</div>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2026 AME Co., Ltd.</div>
  <a href="contact.html" class="footer-contact">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#888" stroke-width="1" stroke-linecap="round">
      <rect x="1" y="2.5" width="10" height="7" rx="1"/>
      <path d="M1 3.5l5 3.5 5-3.5"/>
    </svg>
    Contact
  </a>
</footer>

<script>
  // ---- Canvas setup ----
  const canvas = document.getElementById('main');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const splashes = [];
  let line1Top = 0, line1Bottom = 0, line1Left = 0, line1Right = 0;
  let splashReady = false;

  function getSplashBounds() {
    const el = document.getElementById('tagline');
    if (!el) return;
    const siteRect = canvas.getBoundingClientRect();
    const spans = el.querySelectorAll('.char');
    let minTop = Infinity, maxBottom = -Infinity, minLeft = Infinity, maxRight = -Infinity;
    let firstLineDone = false;
    spans.forEach(span => {
      if (firstLineDone) return;
      const r = span.getBoundingClientRect();
      if (r.top === 0 && r.left === 0) return;
      if (minTop !== Infinity && r.top - siteRect.top > minTop + 50) { firstLineDone = true; return; }
      minTop = Math.min(minTop, r.top - siteRect.top);
      maxBottom = Math.max(maxBottom, r.bottom - siteRect.top);
      minLeft = Math.min(minLeft, r.left - siteRect.left);
      maxRight = Math.max(maxRight, r.right - siteRect.left);
    });
    line1Top = minTop; line1Bottom = maxBottom;
    line1Left = minLeft; line1Right = maxRight;
    splashReady = true;
  }

  function addSplash(x, y) {
    const count = 3 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI * 0.8 + Math.random() * Math.PI * 0.6;
      const speed = 0.5 + Math.random() * 0.9;
      splashes.push({ x, y, vx: Math.cos(angle) * speed * 0.5, vy: Math.sin(angle) * speed - 1.0, opacity: 0.5, r: 0.6 + Math.random() * 0.6 });
    }
  }

  const drops = Array.from({ length: 55 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    len: Math.random() * 14 + 6,
    speed: Math.random() * 1.5 + 1,
    opacity: Math.random() * 0.28 + 0.12
  }));

  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drops.forEach(d => {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 1, d.y + d.len);
      ctx.strokeStyle = `rgba(100,150,185,${d.opacity})`;
      ctx.lineWidth = 0.9;
      ctx.stroke();
      d.y += d.speed;
      if (d.y > canvas.height) { d.y = -d.len; d.x = Math.random() * canvas.width; }
      if (splashReady) {
        const tipY = d.y + d.len;
        if (tipY >= line1Top && tipY <= line1Bottom && d.x >= line1Left && d.x <= line1Right && Math.random() < 0.14) {
          addSplash(d.x, line1Top);
          d.y = -d.len; d.x = Math.random() * canvas.width;
        }
      }
    });
    splashes.forEach((s, i) => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(100,160,195,${s.opacity})`;
      ctx.fill();
      s.x += s.vx; s.y += s.vy; s.vy += 0.09; s.opacity -= 0.035;
      if (s.opacity <= 0) splashes.splice(i, 1);
    });
    requestAnimationFrame(drawFrame);
  }
  drawFrame();

  // ---- Text animation ----
  const line1 = "Inspire others";
  const line2 = "to inspire themselves.";
  const taglineEl = document.getElementById('tagline');
  let html = '';
  [...line1].forEach(c => { html += c === ' ' ? `<span class="char">&nbsp;</span>` : `<span class="char">${c}</span>`; });
  html += '<br>';
  [...line2].forEach(c => { html += c === ' ' ? `<span class="char">&nbsp;</span>` : `<span class="char">${c}</span>`; });
  taglineEl.innerHTML = html;

  const chars = Array.from(document.querySelectorAll('.char'));
  const indices = chars.map((_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }

  const startAt = 400, spread = 3200;
  let landed = 0;
  indices.forEach(charIdx => {
    const el = chars[charIdx];
    const delay = startAt + Math.random() * spread;
    const duration = 700 + Math.random() * 900;
    setTimeout(() => {
      el.style.transition = `transform ${duration}ms cubic-bezier(0.25,0.8,0.4,1), opacity 200ms ease`;
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
      landed++;
      if (landed === chars.length) setTimeout(getSplashBounds, 200);
    }, delay);
  });

  const allDone = startAt + spread + 900;
  setTimeout(() => {
    document.getElementById('puddle-wrap').style.opacity = '1';
    animatePuddle();
  }, allDone + 400);

  // ---- Puddle ----
  const pc = document.getElementById('puddle');
  const pctx = pc.getContext('2d');
  const ripples = [];
  function addRipple() {
    ripples.push({ x: 60 + Math.random() * 160, y: 15 + Math.random() * 4 - 2, r: 1, maxR: 20 + Math.random() * 10, opacity: 0.5, speed: 0.25 + Math.random() * 0.2 });
  }
  function animatePuddle() {
    setInterval(addRipple, 700 + Math.random() * 300);
    function frame() {
      pctx.clearRect(0, 0, pc.width, pc.height);
      pctx.beginPath();
      pctx.ellipse(140, 20, 128, 8, 0, 0, Math.PI * 2);
      pctx.fillStyle = 'rgba(190,215,230,0.18)';
      pctx.fill();
      pctx.strokeStyle = 'rgba(140,185,215,0.3)';
      pctx.lineWidth = 0.5;
      pctx.stroke();
      ripples.forEach((rip, i) => {
        pctx.beginPath();
        pctx.ellipse(rip.x, rip.y, rip.r * 1.8, rip.r * 0.55, 0, 0, Math.PI * 2);
        pctx.strokeStyle = `rgba(120,175,210,${rip.opacity})`;
        pctx.lineWidth = 0.6;
        pctx.stroke();
        rip.r += rip.speed; rip.opacity -= 0.011;
        if (rip.opacity <= 0 || rip.r > rip.maxR) ripples.splice(i, 1);
      });
      requestAnimationFrame(frame);
    }
    frame();
  }
</script>
</body>
</html>
